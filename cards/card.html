<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/card.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
</head>
<body>

    <div class="container">
        <section class="card">
            <h2>Gratuito</h2>
            <h1>R$0/mês</h1>
            <ul>
                <li>1 usuário</li>
                <li>3 contas de design</li>
                <li>Suporte por e-mail</li>
            </ul>
            <button class="select-plan">Escolher plano</button>
        </section>
        <section class="card">
            <h2>Elite</h2>
            <h1>R$99/mês</h1>
            <ul>
                <li>Usuários ilimitados</li>
                <li>10 contas de design</li>
                <li>100 implantações</li>
                <li>Suporte 24h por dia</li>
            </ul>
            <button class="select-plan">Escolher plano</button>
        </section>
        <section class="card">
            <h2>Profissional</h2>
            <h1>R$49/mês</h1>
            <ul>
                <li>100 usuários</li>
                <li>3 contas de design</li>
                <li>Suporte por e-mail</li>
            </ul>
            <button class="select-plan">Escolher plano</button>
        </section>
    </div>
    
</body>
</html>
