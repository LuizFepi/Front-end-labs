<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/form-compre-online.css">
    <title>Formulário</title>
</head>
<body>

    <div class="container">

        <header class="header">
            <h1>Faça seu cadastro!</h1>
            <h2>compre online 🛒</h2>
        </header>

        <div class="form-online">
            <form action="">
                <div class="personal-data">
                    <h2>Dados Pessoais</h2>
                    <div class="form-item">
                        <label for="name">Nome</label>
                        <input type="text" name="name" id="name" required>
                    </div>
                    <div class="form-item">
                        <label for="email">E-mail</label>
                        <input type="text" name="email" id="email" required>
                    </div>
                    <div class="form-item">
                        <label for="date">Data de Nascimento</label>
                        <input type="date" name="date" id="date" required>
                    </div>
                    <div class="form-item">
                        <label for="cpf">CPF</label>
                        <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" required>
                    </div>
                </div>
                <div class="adress">
                    <h2>Endereço</h2>
                    <div class="form-item">
                        <label for="street">Rua</label>
                        <input type="text" name="street" id="street" required>
                    </div>
                    <div class="form-item">
                        <label for="number">Número</label>
                        <input type="number" name="number" id="number" required>
                    </div>
                    <div class="form-item">
                        <label for="neighborhood">Bairro</label>
                        <input type="text" name="neighborhood" id="neighborhood" required>
                    </div>
                    <div class="form-item">
                        <label for="cep">CEP</label>
                        <input type="text" name="cep" id="cep" placeholder="00000-000" required>
                    </div>
                    <div class="form-item">
                        <label for="street">Cidade</label>
                        <input type="text" name="street" id="street" required>
                    </div>
                    <div class="form-item">
                        <label for="street">Estado</label>
                        <select name="street" id="street">
                            <option value="Selecione" >Selecione um estado</option>
                            <option value="Estado-1">Estado 1</option>
                            <option value="Estado-2">Estado 2</option>
                            <option value="Estado-3">Estado 3</option>
                        </select required>
                    </div>
                </div>
                <div class="login">
                    <h2>Login</h2>
                    <div class="form-item">
                        <label for="perfil-image">Imagem de perfil</label>
                        <input type="file" name="perfil-image" id="perfil-image" required>
                    </div>
                    <div class="form-item">
                        <label for="login">Login</label>
                        <input type="text" name="login" id="login" required>
                    </div>
                    <div class="form-item">
                        <label for="password">Senha</label>
                        <input type="text" name="password" id="password" required>
                    </div>
                    <div class="form-item">
                        <label for="password-confirm">Confirmação de senha</label>
                        <input type="text" name="password-confirm" id="password-confirm" required>
                    </div>
                </div>
                <div class="buttons">
                    <button class="cancel-button">Cancelar</button>
                    <button class="confirm-button">Enviar</button>
                </div>
            </form>
        </div>
    </div>
    
</body>
</html>
