<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>

    <div id="container">

        <header>
            <h1>Faça seu cadastro!</h1>
            <h2>compre online 🛒</h2>
        </header>

        <div id="personal-data">
            <h2>Dados Pessoais</h2>
            <div class="form-item">
                <label for="name">Nome</label>
                <input type="text" name="name" id="name">
            </div>
            <div class="form-item">
                <label for="email">E-mail</label>
                <input type="text" name="email" id="email">
            </div>
            <div class="form-item">
                <label for="date">Data de Nascimento</label>
                <input type="date" name="date" id="date">
            </div>
            <div class="form-item">
                <label for="cpf">CPF</label>
                <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00">
            </div>
        </div>
        <div id="adress">
            <h2>Endereço</h2>
            <div class="form-item">
                <label for="street">Rua</label>
                <input type="text" name="street" id="street">
            </div>
            <div class="form-item">
                <label for="number">Número</label>
                <input type="number" name="number" id="number">
            </div>
            <div class="form-item">
                <label for="neighborhood">Bairro</label>
                <input type="text" name="neighborhood" id="neighborhood">
            </div>
            <div class="form-item">
                <label for="cep">CEP</label>
                <input type="text" name="cep" id="cep" placeholder="00000-000">
            </div>
            <div class="form-item">
                <label for="street">Cidade</label>
                <input type="text" name="street" id="street">
            </div>
            <div class="form-item">
                <label for="street">Estado</label>
                <select name="street" id="street">
                    <option value="Selecione" >Selecione um estado</option>
                    <option value="Estado-1">Estado 1</option>
                    <option value="Estado-2">Estado 2</option>
                    <option value="Estado-3">Estado 3</option>
                </select>
            </div>
        </div>
        <div id="login">
            <h2>Login</h2>
            <div class="form-item">
                <label for="perfil-image">Imagem de perfil</label>
                <input type="file" name="perfil-image" id="perfil-image">
            </div>
            <div class="form-item">
                <label for="login">Login</label>
                <input type="text" name="login" id="login">
            </div>
            <div class="form-item">
                <label for="password">Senha</label>
                <input type="text" name="password" id="password">
            </div>
        </div>
        <div id="buttons">
            <button>Cancelar</button>
            <button>Enviar</button>
        </div>
    </div>
    
</body>
</html>
