<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/form-fale-conosco-flex.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap" rel="stylesheet">
    <title>Form</title>
</head>
<body>

    <main class="container">

        <header class="header">
            <h1>Fale Conosco</h1>

            <p>
                Estamos aqui para ajudar! Preencha o formalário abaixo e entraremos em contato com você o mais breve possível.
            </p>
        </header>

        <form action="Fale-Conosco" class="form-fale-conosco">
            <div class="form-item">
                <label for="Primeiro Nome">Primeiro Nome</label>
                <input type="text" name="Primeiro Nome" id="input_first_name_form" placeholder="Seu nome..." maxlength="40" minlength="2">
            </div>
            <div class="form-item">
                <label for="Último Nome">Último Nome</label>
                <input type="text" name="Último Nome" id="input_last_name_form" placeholder="Seu sobrenome..." maxlength="60" minlength="2">
            </div>
            <div class="form-item">
                <label for="E-mail">E-mail</label>
                <input type="email" name="E-mail" id="input_email_form" placeholder="Seu e-mail." maxlength="30">
            </div>
            <div class="form-item">
                <label for="Pais">Pais</label>
                <select name="Pais" id="select_form">
                    <option value="Selecione">Selecione</option>
                    <option value="Brasil">Brasil</option>
                    <option value="Portugal">Portugal</option>
                    <option value="Mexico">Mexico</option>
                </select>
            </div>
            <div class="form-item">
                <label for="Assunto">Assunto</label>
                <textarea cols="20" rows="2" name="Assunto" id="textarea_form" placeholder="Escreva aqui..."></textarea>
            </div>
            <div class="form-button">
                <input type="button" value="Limpar" id="limpar-button">
                <input type="button" value="Enviar" id="enviar-button">
            </div>
        </form>
        <p class="bottom_text">Em caso de duvida entre em contato 📞</p>

    </main>
    
</body>
</html>
